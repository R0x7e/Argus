# Argus Alembic 数据库迁移配置

[alembic]
# 迁移脚本目录
script_location = alembic

# 数据库连接 URL（运行时从环境变量覆盖）
sqlalchemy.url = postgresql+asyncpg://argus:argus_dev_password@localhost:5432/argus

# 迁移文件模板
file_template = %%(rev)s_%%(slug)s

# 时区设置
timezone = UTC

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
