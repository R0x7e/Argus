# Argus - AI SRC 漏洞挖掘系统 Docker Compose 配置
# 包含 PostgreSQL、Redis、NATS 基础服务

version: "3.9"

services:
  # PostgreSQL 数据库服务
  postgres:
    image: postgres:16
    container_name: argus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存与消息队列服务
  redis:
    image: redis:7
    container_name: argus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NATS 消息总线（启用 JetStream）
  nats:
    image: nats:latest
    container_name: argus-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"  # HTTP 监控端口
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats_data:/data

  # Argus 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: argus-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus_dev_password@postgres:5432/argus
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-argus-dev-secret-key-2024}
      MITMPROXY_URL: http://mitmproxy:8080
      CRAWLERGO_URL: http://crawlergo:7777
      POC_SANDBOX_URL: http://poc-sandbox:9090
      PROXY_FLOWS_CHANNEL: "proxy:flows"
      DEBUG: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      mitmproxy:
        condition: service_healthy
      poc-sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Argus 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_INTERNAL_URL=http://backend:8000
    container_name: argus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ""
      NEXT_PUBLIC_WS_HOST: localhost:8000
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  # mitmproxy 流量代理 Sidecar
  mitmproxy:
    build:
      context: ./mitmproxy
      dockerfile: Dockerfile
    container_name: argus-mitmproxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379/0
      PROXY_CHANNEL: "proxy:flows"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8080)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # crawlergo 深度爬虫 Sidecar
  crawlergo:
    build:
      context: ./crawlergo
      dockerfile: Dockerfile
    container_name: argus-crawlergo
    restart: unless-stopped
    ports:
      - "7777:7777"
    environment:
      LISTEN_ADDR: "0.0.0.0:7777"
      CHROMIUM_PATH: "/usr/bin/chromium"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Python PoC 沙箱执行器
  poc-sandbox:
    build:
      context: ./poc-sandbox
      dockerfile: Dockerfile
    container_name: argus-poc-sandbox
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      LISTEN_ADDR: "0.0.0.0:9090"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    read_only: true
    tmpfs:
      - /tmp:size=50M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  nats_data:
    driver: local
